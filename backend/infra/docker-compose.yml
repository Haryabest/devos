# Локальная инфраструктура DevOS: pgvector, Redis, MinIO.
# Использование:
#   docker compose -f infra/docker-compose.yml up -d
# либо из корня: pnpm infra:up

name: devos

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devos
      POSTGRES_PASSWORD: devos
      POSTGRES_DB: devos
    ports:
      - '5432:5432'
    volumes:
      - devos-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devos -d devos']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: devos-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - devos-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: devos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: devos
      MINIO_ROOT_PASSWORD: devos12345
    ports:
      - '9002:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - devos-minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  # Заводит бакет `devos` при первом запуске.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 devos devos12345 &&
        mc mb --ignore-existing local/devos &&
        mc anonymous set download local/devos &&
        echo 'MinIO bucket devos ready'
      "

volumes:
  devos-pg:
  devos-redis:
  devos-minio:
