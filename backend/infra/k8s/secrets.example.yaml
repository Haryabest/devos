# Copy to secrets.yaml, fill values, apply: kubectl apply -f secrets.yaml
# Do NOT commit secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: devos-api-env
  namespace: devos
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "3333"
  HOST: 0.0.0.0
  POSTGRES_PASSWORD: CHANGE_ME_STRONG_POSTGRES
  DATABASE_URL: postgresql://devos:CHANGE_ME_STRONG_POSTGRES@postgres:5432/devos
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_SECRET: CHANGE_ME_ACCESS_SECRET_MIN_16
  JWT_REFRESH_SECRET: CHANGE_ME_REFRESH_SECRET_MIN_16
  CORS_ORIGIN: https://devos.example.com
  OPENAI_API_KEY: ""
  STORAGE_DRIVER: MINIO
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: devos
  S3_ACCESS_KEY: devos
  S3_SECRET_KEY: CHANGE_ME_MINIO
  S3_FORCE_PATH_STYLE: "true"
  GITHUB_WEBHOOK_SECRET: ""
  SENTRY_DSN: ""
