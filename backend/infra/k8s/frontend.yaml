apiVersion: apps/v1
kind: Deployment
metadata:
  name: devos-frontend
  namespace: devos
  labels:
    app: devos-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devos-frontend
  template:
    metadata:
      labels:
        app: devos-frontend
    spec:
      containers:
        - name: frontend
          image: devos/frontend:latest
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: devos-frontend
  namespace: devos
spec:
  selector:
    app: devos-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
