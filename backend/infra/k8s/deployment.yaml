apiVersion: apps/v1
kind: Deployment
metadata:
  name: devos-api
  namespace: devos
  labels:
    app: devos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devos-api
  template:
    metadata:
      labels:
        app: devos-api
    spec:
      initContainers:
        - name: migrate
          image: devos/api:latest
          command: ['sh', '-c', 'cd /app/packages/db && npx prisma migrate deploy']
          envFrom:
            - secretRef:
                name: devos-api-env
      containers:
        - name: api
          image: devos/api:latest
          ports:
            - containerPort: 3333
              name: http
          envFrom:
            - secretRef:
                name: devos-api-env
          readinessProbe:
            httpGet:
              path: /health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3333
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: devos-api
  namespace: devos
  labels:
    app: devos-api
spec:
  selector:
    app: devos-api
  ports:
    - name: http
      port: 3333
      targetPort: 3333
      protocol: TCP
  type: ClusterIP
