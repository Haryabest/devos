apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devos-api
  namespace: devos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devos-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devos-frontend
  namespace: devos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devos-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
